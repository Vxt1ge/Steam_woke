<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathFlash | Smart Math Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.73/build/spline-viewer.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        body { background-color: #030308; margin: 0; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        .spline-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: auto; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent 0%, #030308 90%); z-index: 1; pointer-events: none; }
        .content-layer { position: relative; z-index: 10; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(12, 12, 20, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.8s ease-out forwards; }
    </style>
</head>
<body class="text-slate-300 antialiased">

    <div class="spline-container">
        <spline-viewer url="https://prod.spline.design/uILr2PwSxHtivmIs/scene.splinecode"></spline-viewer>
    </div>
    <div class="bg-overlay"></div>

    <div class="content-layer min-h-screen flex flex-col">
        
        <nav class="border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
                <div class="flex items-center cursor-pointer" onclick="location.reload()">
                    <span class="font-bold text-xl text-white">Math<span class="font-light text-slate-400">Flash</span></span>
                </div>
                <div class="flex items-center gap-6">
                    <button class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded-full text-sm font-medium transition shadow-lg shadow-indigo-500/20">
                        Get Started
                    </button>
                </div>
            </div>
        </nav>

        <main class="flex-grow pt-12 pb-20 px-6">
            <div id="view-home" class="max-w-5xl mx-auto animate-slide-up">
                <div class="text-center mb-12">
                    <h1 class="text-5xl md:text-7xl font-serif text-white mb-6 drop-shadow-2xl">
                        Smart Math for stupid people
                    </h1>
                </div>

                <!-- <div class="max-w-3xl mx-auto mb-20">
                    <div class="glass rounded-2xl p-2 flex items-center shadow-2xl">
                        <button onclick="processInput()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-xl font-bold transition-all flex items-center gap-2">
                            <i data-lucide="sparkles" class="w-5 h-5"></i> Process
                        </button>
                    </div>
                </div> -->

                <div id="topic-cards-container" class="grid md:grid-cols-3 gap-6"></div>
            </div>

            <div id="view-quiz" class="max-w-3xl mx-auto p-6 hidden animate-slide-up">
                <div class="bg-black/60 backdrop-blur-xl rounded-3xl p-10 border border-white/10 shadow-2xl">
                    <button onclick="showHome()" class="mb-8 text-slate-500 hover:text-white flex items-center gap-2 text-sm transition">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i> Back to Hub
                    </button>
                    <h2 id="question-text" class="text-3xl font-serif text-white mb-8">Loading...</h2>
                    <div id="options-container" class="space-y-4"></div>
                </div>
            </div>
        </main>

        <footer class="py-10 text-center bg-black/60 backdrop-blur-md border-t border-white/5">
            <p class="text-slate-400 text-sm flex items-center justify-center gap-1.5">
                Created by <span class="text-white font-semibold">Euro</span> 
                <span class="mx-1">•</span> 
                Open resource by <span class="flex items-center gap-1 text-slate-200"><i data-lucide="github" class="w-3.5 h-3.5"></i> Github</span> 
                and <span class="text-slate-200">OpenAI</span>
            </p>
        </footer>
    </div>

    <script>
        const quizData = {
            "central-tendencies": { title: "Central Tendencies", icon: "bar-chart-2", desc: "Mean, Median, Mode, and Range." },
            "best-line-fit": { title: "Best Line Fit", icon: "trending-up", desc: "Regressions and correlations." },
            "exponential": { title: "Exponential Functions", icon: "activity", desc: "Growth and decay equations." }
        };

        function initHome() {
            const container = document.getElementById('topic-cards-container');
            container.innerHTML = Object.entries(quizData).map(([key, topic]) => `
                <div onclick="startQuiz('${key}')" class="glass p-8 rounded-2xl hover:border-indigo-500/50 transition-all cursor-pointer group">
                    <div class="w-12 h-12 bg-indigo-500/10 rounded-xl flex items-center justify-center mb-6 border border-indigo-500/20 group-hover:scale-110 transition-transform">
                        <i data-lucide="${topic.icon}" class="text-indigo-400"></i>
                    </div>
                    <h3 class="text-2xl font-serif text-white mb-2">${topic.title}</h3>
                    <p class="text-slate-400 text-sm mb-6">${topic.desc}</p>
                    <span class="text-indigo-400 text-sm font-bold flex items-center">Initialize <i data-lucide="arrow-right" class="w-4 h-4 ml-1"></i></span>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function processInput() {
            const input = document.getElementById('ai-input').value;
            if(input) alert("Input received! Processing via OpenAI logic...");
        }

        function startQuiz(id) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            document.getElementById('question-text').innerText = quizData[id].title + " Quiz";
            document.getElementById('options-container').innerHTML = `
                <button class="w-full text-left p-4 rounded-xl border border-white/5 bg-white/5 hover:bg-white/10 text-slate-300 transition-all">Sample Option 1</button>
                <button class="w-full text-left p-4 rounded-xl border border-white/5 bg-white/5 hover:bg-white/10 text-slate-300 transition-all">Sample Option 2</button>
            `;
        }

        function showHome() {
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-home').classList.remove('hidden');
        }

        initHome();
    </script>
</body>
</html>
