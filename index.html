<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathFlash | Smart Math Engine</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- SPLINE VIEWER SCRIPT -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.73/build/spline-viewer.js"></script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.6s ease-out forwards; }
        
        /* Ensure Spline logo is hidden if possible, and remove background color */
        spline-viewer {
            --spline-viewer-bg-color: transparent;
        }
    </style>
</head>
<body class="bg-[#030308] font-sans text-slate-300 relative selection:bg-purple-500/30">

    <div class="min-h-screen flex flex-col overflow-hidden relative">
        <!-- Massive Glowing Aura Background -->
        <div class="absolute top-[-20%] left-1/2 -translate-x-1/2 w-[150%] md:w-[1200px] h-[800px] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-900/40 via-purple-900/20 to-transparent blur-[120px] pointer-events-none z-0 rounded-[100%]"></div>
        
        <!-- SPLINE VIEWER BACKGROUND (Your custom 3D design) -->
        <div class="absolute top-0 left-0 w-full h-full pointer-events-none z-0 opacity-70">
            <spline-viewer url="https://prod.spline.design/uILr2PwSxHtivmIs/scene.splinecode"></spline-viewer>
        </div>
        
        <!-- Top Navigation Bar -->
        <nav class="border-b border-white/5 bg-black/20 backdrop-blur-md sticky top-0 z-20">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center cursor-pointer group" onclick="returnHome()">
                        <div class="flex items-center text-white/80 group-hover:text-white transition-colors">
                            <div class="flex items-end space-x-[2px] mr-3 h-4">
                                <div class="w-[2px] h-2 bg-white/80 rounded-full"></div>
                                <div class="w-[2px] h-4 bg-white/80 rounded-full"></div>
                                <div class="w-[2px] h-3 bg-white/80 rounded-full"></div>
                                <div class="w-[2px] h-[6px] bg-white/80 rounded-full"></div>
                            </div>
                            <span class="font-semibold text-xl tracking-wide">Math<span class="font-light">Flash</span></span>
                        </div>
                    </div>

                    <div class="flex items-center" id="nav-actions">
                        <!-- Score or Get Started button will be injected here -->
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="pt-8 relative z-10 flex-grow pb-12 w-full">
            
            <!-- HOME VIEW -->
            <div id="view-home" class="max-w-5xl mx-auto p-6 animate-fade-in block">
                <div class="text-center mb-16 mt-16">
                    <h1 class="text-5xl md:text-6xl font-serif text-white mb-6 tracking-normal drop-shadow-lg">
                        Smart Math for stupid people <br />
                    </h1>
                </div>
                <div id="topic-cards-container" class="grid md:grid-cols-3 gap-6">
                    <!-- Cards injected by JS -->
                </div>
            </div>

            <!-- QUIZ VIEW -->
            <div id="view-quiz" class="max-w-3xl mx-auto p-6 animate-fade-in hidden">
                <!-- Header -->
                <div class="flex justify-between items-center mb-8 bg-[#0c0c14]/50 backdrop-blur-md p-4 rounded-2xl border border-white/5">
                    <button onclick="returnHome()" class="flex items-center text-slate-400 hover:text-white font-medium transition-colors text-sm">
                        <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Back
                    </button>
                    <div class="flex items-center">
                        <span id="quiz-progress-text" class="text-xs font-semibold text-slate-500 mr-4 tracking-widest uppercase">
                            1 / 4
                        </span>
                        <div id="quiz-topic-badge" class="px-3 py-1 rounded-full text-xs font-medium text-indigo-300 bg-indigo-500/10 border border-indigo-500/20">
                            Topic Title
                        </div>
                    </div>
                </div>

                <!-- Glass Question Container -->
                <div class="bg-[#0c0c14]/80 backdrop-blur-2xl rounded-2xl p-8 md:p-10 shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-white/10 mb-6 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
                    
                    <h2 id="question-text" class="text-2xl md:text-3xl font-serif text-white mb-8 leading-snug">
                        Question goes here?
                    </h2>

                    <div id="options-container" class="space-y-3">
                        <!-- Options injected by JS -->
                    </div>

                    <!-- Feedback Section (Hidden initially) -->
                    <div id="feedback-section" class="mt-8 p-5 rounded-xl animate-fade-in backdrop-blur-md hidden">
                        <h4 id="feedback-title" class="text-base font-medium flex items-center mb-2">
                        </h4>
                        <p id="feedback-text" class="text-slate-400 text-sm leading-relaxed">
                            Explanation goes here.
                        </p>
                    </div>
                </div>

                <!-- Action Button -->
                <div id="next-action-container" class="flex justify-end animate-fade-in hidden">
                    <button onclick="handleNextQuestion()" id="next-btn" class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white px-8 py-3 rounded-full font-medium text-sm flex items-center transition-all hover:shadow-[0_0_20px_rgba(124,58,237,0.4)]">
                        Generate Next
                    </button>
                </div>
            </div>

            <!-- RESULTS VIEW -->
            <div id="view-results" class="max-w-xl mx-auto p-6 mt-12 animate-zoom-in hidden">
                <div class="bg-[#0c0c14]/80 backdrop-blur-2xl rounded-2xl p-10 text-center shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-white/10 relative overflow-hidden">
                    <div class="w-20 h-20 bg-gradient-to-br from-indigo-500/20 to-purple-500/20 rounded-full flex items-center justify-center mx-auto mb-6 text-indigo-400 border border-white/5">
                        <i data-lucide="activity" class="w-9 h-9"></i>
                    </div>
                    
                    <h2 id="results-message" class="text-3xl font-serif text-white mb-2">Message</h2>
                    <p id="results-submessage" class="text-slate-400 mb-10 text-sm">Module processed.</p>
                    
                    <div class="flex justify-center space-x-12 mb-10 p-6 bg-white/5 rounded-xl border border-white/5">
                        <div>
                            <p class="text-xs font-medium text-slate-500 uppercase tracking-widest mb-1">Score</p>
                            <p class="text-3xl font-light text-white"><span id="results-score">0</span><span class="text-xl text-slate-500">/<span id="results-total">0</span></span></p>
                        </div>
                        <div class="w-px bg-white/10"></div>
                        <div>
                            <p class="text-xs font-medium text-slate-500 uppercase tracking-widest mb-1">Accuracy</p>
                            <p id="results-accuracy" class="text-3xl font-light text-indigo-400">0%</p>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4 justify-center">
                        <button onclick="handleStartQuiz(state.selectedTopic)" class="px-6 py-3 rounded-full font-medium text-slate-300 bg-white/5 hover:bg-white/10 border border-white/5 transition-colors text-sm">
                            Re-run Module
                        </button>
                        <button onclick="returnHome()" class="px-6 py-3 rounded-full font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 transition-all hover:shadow-[0_0_20px_rgba(124,58,237,0.4)] text-sm">
                            Return to Hub
                        </button>
                    </div>
                </div>
            </div>

        </main>

        <!-- Footer -->
        <footer class="relative z-10 border-t border-white/5 py-8 text-center bg-black/20 backdrop-blur-md mt-auto">
            <p class="text-slate-500 text-sm font-light">
                Created by Cola 🥤 <span class="text-white font-medium tracking-wide"> | Reference By: Github / OpenSource </span>
            </p>
        </footer>
    </div>

    <!-- Application Logic -->
    <script>
        // Data Store
        const quizData = {
            "central-tendencies": {
                title: "Central Tendencies",
                description: "Mean, Median, Mode, Range, IQR, Standard Deviation, and the 68-95-99.7 Rule.",
                icon: "bar-chart-2",
                questions: [
                    { q: "According to the 68-95-99.7 Rule (Empirical Rule), what percentage of data falls within ONE standard deviation of the mean in a normal distribution?", options: ["50%", "68%", "95%", "99.7%"], answer: "68%", explanation: "In a normal distribution, about 68% of values fall within 1 standard deviation, 95% within 2, and 99.7% within 3." },
                    { q: "Which measure of central tendency is most affected by an extreme outlier?", options: ["Median", "Mode", "Mean", "Interquartile Range (IQR)"], answer: "Mean", explanation: "The mean includes all values in its calculation, so a very high or very low outlier will pull the mean towards it. The median is resistant to outliers." },
                    { q: "How do you calculate the Interquartile Range (IQR)?", options: ["Maximum - Minimum", "Quartile 3 - Quartile 1", "Mean - Median", "Standard Deviation ^ 2"], answer: "Quartile 3 - Quartile 1", explanation: "The IQR measures the spread of the middle 50% of the data, found by subtracting the first quartile (Q1) from the third quartile (Q3)." },
                    { q: "In a box plot, what does the vertical line inside the box represent?", options: ["Mean", "Median", "Mode", "Range"], answer: "Median", explanation: "The box plot displays the 5-number summary: Min, Q1, Median (line inside the box), Q3, and Max." }
                ]
            },
            "best-line-fit": {
                title: "Best Line Fit",
                description: "Scatter plots, linear regression, and correlation.",
                icon: "trending-up",
                questions: [
                    { q: "What is the primary purpose of a line of best fit (trend line)?", options: ["To connect all the dots on a scatter plot.", "To show the exact median of the data.", "To predict values based on the trend of the data.", "To find the standard deviation."], answer: "To predict values based on the trend of the data.", explanation: "The line of best fit models the general direction of the data, allowing us to make predictions." },
                    { q: "If a scatter plot shows points tightly clustered around a line that goes down from left to right, what type of correlation is this?", options: ["Strong Positive", "Weak Positive", "Strong Negative", "No Correlation"], answer: "Strong Negative", explanation: "Going down from left to right means negative correlation. Tightly clustered means it is strong." },
                    { q: "In the equation of a line of best fit, y = mx + b, what does 'm' represent?", options: ["The y-intercept", "The correlation coefficient", "The starting value", "The slope (rate of change)"], answer: "The slope (rate of change)", explanation: "'m' is the slope, representing how much y changes for every 1 unit change in x." },
                    { q: "Which correlation coefficient (r) represents the strongest relationship?", options: ["r = 0.85", "r = -0.92", "r = 0.10", "r = -0.50"], answer: "r = -0.92", explanation: "The strength of correlation is based on how close 'r' is to 1 or -1. -0.92 is closer to -1 than 0.85 is to 1." }
                ]
            },
            "exponential-function": {
                title: "Exponential Functions",
                description: "Growth, decay, and identifying exponential equations.",
                icon: "activity",
                questions: [
                    { q: "In the standard exponential function y = a(b)^x, what does 'a' represent?", options: ["The growth factor", "The initial value (y-intercept)", "The asymptote", "The rate of change"], answer: "The initial value (y-intercept)", explanation: "'a' is the starting amount when x = 0." },
                    { q: "If the base 'b' in y = a(b)^x is between 0 and 1 (e.g., b = 0.5), what does the graph represent?", options: ["Exponential Growth", "Exponential Decay", "Linear Growth", "Constant Function"], answer: "Exponential Decay", explanation: "When 0 < b < 1, the values decrease as x increases, representing decay (like half-life)." },
                    { q: "Which real-world scenario is best modeled by an exponential function?", options: ["Earning $15 per hour worked.", "A car traveling at a constant speed of 60 mph.", "A bacteria population doubling every hour.", "A pool draining 10 gallons every minute."], answer: "A bacteria population doubling every hour.", explanation: "Doubling involves multiplying by 2 repeatedly, which is exponential growth. The others have a constant rate of change (linear)." },
                    { q: "What is the horizontal asymptote of the basic exponential parent function y = 2^x?", options: ["y = 0", "y = 1", "x = 0", "There is no asymptote"], answer: "y = 0", explanation: "The graph of y = 2^x gets closer and closer to the x-axis (y=0) but never touches or crosses it." }
                ]
            }
        };

        // Application State
        const state = {
            currentView: 'home',
            selectedTopic: null,
            currentQuestionIndex: 0,
            score: 0,
            selectedAnswer: null,
            isAnswered: false
        };

        // Navigation & Views
        function switchView(viewId) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-results').classList.add('hidden');
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            state.currentView = viewId;
            updateNav();
        }

        function updateNav() {
            const navContainer = document.getElementById('nav-actions');
            if (state.currentView === 'quiz') {
                navContainer.innerHTML = `
                    <div class="hidden sm:flex items-center space-x-2 bg-white/5 border border-white/10 px-4 py-1.5 rounded-full">
                        <span class="text-sm font-medium text-slate-400">Score:</span>
                        <span class="text-sm font-bold text-indigo-400">${state.score}</span>
                    </div>`;
            } else {
                navContainer.innerHTML = `
                    <button class="bg-white/10 hover:bg-white/20 border border-white/10 text-white px-5 py-2 rounded-full text-sm font-medium transition-all backdrop-blur-sm">
                        Get Started
                    </button>`;
            }
        }

        function returnHome() {
            state.selectedTopic = null;
            switchView('home');
        }

        // Home View Setup
        function initHome() {
            const container = document.getElementById('topic-cards-container');
            let cardsHTML = '';
            
            for (const [key, topic] of Object.entries(quizData)) {
                cardsHTML += `
                <button onclick="handleStartQuiz('${key}')" class="group relative bg-[#0c0c14]/80 backdrop-blur-xl rounded-2xl p-8 text-left border border-white/5 hover:border-purple-500/30 transition-all duration-500 hover:shadow-[0_0_30px_rgba(124,58,237,0.1)] flex flex-col h-full overflow-hidden w-full">
                    <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent group-hover:via-purple-500/50 transition-colors duration-500"></div>
                    <div class="w-12 h-12 rounded-xl flex items-center justify-center text-white mb-6 bg-white/5 border border-white/10 group-hover:scale-110 transition-transform duration-500">
                        <i data-lucide="${topic.icon}" class="text-indigo-300 w-6 h-6"></i>
                    </div>
                    <h3 class="text-2xl font-serif text-white mb-3">${topic.title}</h3>
                    <p class="text-slate-400 text-sm mb-8 flex-grow leading-relaxed">${topic.description}</p>
                    <div class="flex items-center text-indigo-400 font-medium text-sm group-hover:text-indigo-300 transition-colors">
                        Initialize <i data-lucide="arrow-right" class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform"></i>
                    </div>
                </button>`;
            }
            container.innerHTML = cardsHTML;
            lucide.createIcons(); // Initialize icons newly added to DOM
        }

        // Quiz Logic
        function handleStartQuiz(topicId) {
            state.selectedTopic = topicId;
            state.currentQuestionIndex = 0;
            state.score = 0;
            state.selectedAnswer = null;
            state.isAnswered = false;
            
            document.getElementById('quiz-topic-badge').innerText = quizData[topicId].title;
            renderQuestion();
            switchView('quiz');
        }

        function renderQuestion() {
            const topic = quizData[state.selectedTopic];
            const qData = topic.questions[state.currentQuestionIndex];
            
            // Update Header
            document.getElementById('quiz-progress-text').innerText = `${state.currentQuestionIndex + 1} / ${topic.questions.length}`;
            document.getElementById('question-text').innerText = qData.q;
            
            // Hide Feedback & Next Button initially
            document.getElementById('feedback-section').classList.add('hidden');
            document.getElementById('next-action-container').classList.add('hidden');

            // Render Options
            const optionsContainer = document.getElementById('options-container');
            let optionsHTML = '';
            
            qData.options.forEach((option, index) => {
                const letter = String.fromCharCode(65 + index);
                
                // Base styles for unanswered options
                let btnClass = "border-white/5 text-slate-300 bg-white/5 hover:border-purple-500/30 hover:bg-white/10 hover:shadow-[0_0_15px_rgba(124,58,237,0.1)]";
                let iconHTML = '';

                // Apply styles if question is answered
                if (state.isAnswered) {
                    if (option === qData.answer) {
                        btnClass = "bg-emerald-900/20 border-emerald-500/40 text-emerald-300 shadow-[0_0_20px_rgba(16,185,129,0.15)]";
                        iconHTML = `<i data-lucide="check-circle-2" class="text-emerald-400 ml-auto w-5 h-5"></i>`;
                    } else if (option === state.selectedAnswer) {
                        btnClass = "bg-red-900/20 border-red-500/40 text-red-300 opacity-90";
                        iconHTML = `<i data-lucide="x-circle" class="text-red-400 ml-auto w-5 h-5"></i>`;
                    } else {
                        btnClass = "border-white/5 text-slate-600 bg-transparent opacity-40";
                    }
                }

                optionsHTML += `
                <button ${state.isAnswered ? 'disabled' : ''} onclick="handleAnswerSelect('${option.replace(/'/g, "\\'")}')" class="w-full text-left p-4 rounded-xl border font-medium transition-all duration-300 flex items-center ${btnClass}">
                    <span class="w-7 h-7 rounded-md bg-black/40 flex items-center justify-center mr-4 text-slate-400 text-sm font-bold border border-white/5 shadow-inner">
                        ${letter}
                    </span>
                    ${option}
                    ${iconHTML}
                </button>`;
            });

            optionsContainer.innerHTML = optionsHTML;
            lucide.createIcons();

            // Render Feedback if answered
            if (state.isAnswered) {
                const feedbackSection = document.getElementById('feedback-section');
                const feedbackTitle = document.getElementById('feedback-title');
                
                feedbackSection.classList.remove('hidden', 'bg-emerald-500/10', 'border-emerald-500/20', 'bg-red-500/10', 'border-red-500/20');
                
                if (state.selectedAnswer === qData.answer) {
                    feedbackSection.classList.add('bg-emerald-500/10', 'border', 'border-emerald-500/20');
                    feedbackTitle.className = "text-base font-medium flex items-center mb-2 text-emerald-400";
                    feedbackTitle.innerHTML = `<i data-lucide="check-circle-2" class="w-4 h-4 mr-2"></i> Verified`;
                } else {
                    feedbackSection.classList.add('bg-red-500/10', 'border', 'border-red-500/20');
                    feedbackTitle.className = "text-base font-medium flex items-center mb-2 text-red-400";
                    feedbackTitle.innerHTML = `<i data-lucide="x-circle" class="w-4 h-4 mr-2"></i> Needs Review`;
                }
                
                document.getElementById('feedback-text').innerText = qData.explanation;
                
                // Setup next button text
                const isLast = state.currentQuestionIndex === topic.questions.length - 1;
                document.getElementById('next-btn').innerText = isLast ? 'Complete Module' : 'Generate Next';
                document.getElementById('next-action-container').classList.remove('hidden');
                
                lucide.createIcons();
            }
        }

        function handleAnswerSelect(option) {
            if (state.isAnswered) return;
            
            state.selectedAnswer = option;
            state.isAnswered = true;
            
            const currentQ = quizData[state.selectedTopic].questions[state.currentQuestionIndex];
            if (option === currentQ.answer) {
                state.score++;
                updateNav(); // Update score in nav
            }
            
            renderQuestion(); // Re-render to show colors and feedback
        }

        function handleNextQuestion() {
            const topic = quizData[state.selectedTopic];
            if (state.currentQuestionIndex < topic.questions.length - 1) {
                state.currentQuestionIndex++;
                state.selectedAnswer = null;
                state.isAnswered = false;
                renderQuestion();
            } else {
                renderResults();
            }
        }

        // Results Logic
        function renderResults() {
            const topic = quizData[state.selectedTopic];
            const total = topic.questions.length;
            const percentage = Math.round((state.score / total) * 100);
            
            let message = "Keep Building";
            if (percentage === 100) message = "Production Ready";
            else if (percentage >= 75) message = "Solid Foundation";

            document.getElementById('results-message').innerText = message;
            document.getElementById('results-submessage').innerText = `Module '${topic.title}' processed.`;
            document.getElementById('results-score').innerText = state.score;
            document.getElementById('results-total').innerText = total;
            
            const accEl = document.getElementById('results-accuracy');
            accEl.innerText = `${percentage}%`;
            accEl.className = `text-3xl font-light ${percentage >= 75 ? 'text-emerald-400' : percentage >= 50 ? 'text-indigo-400' : 'text-red-400'}`;

            switchView('results');
        }

        // Initialize App
        updateNav();
        initHome();
        lucide.createIcons(); // Initialize static icons

    </script>
</body>
</html>
